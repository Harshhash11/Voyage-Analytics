apiVersion: apps/v1
kind: Deployment
metadata:
  name: voyage-flight-price-api
  labels:
    app: voyage-flight-price-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: voyage-flight-price-api
  template:
    metadata:
      labels:
        app: voyage-flight-price-api
    spec:
      containers:
        - name: api
          image: voyage-flight-price-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
